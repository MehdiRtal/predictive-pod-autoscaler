scaler:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/mehdirtal/predictive-pod-autoscaler/scaler
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  resources:
    limits:
      cpu: "500m"
      memory: 512Mi
    requests:
      cpu: "250m"
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

pipeline:
  image:
    repository: ghcr.io/mehdirtal/predictive-pod-autoscaler/pipeline
    tag: ""
    pullPolicy: IfNotPresent

runtime:
  image:
    repository: ghcr.io/mehdirtal/predictive-pod-autoscaler/runtime
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 2Gi

keda:
  enabled: false

argo-workflows:
  enabled: false

kro:
  enabled: false

kserve:
  enabled: false
  kserve:
    certManager:
      enabled: false

s3:
  create: true
  externalConfig:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
    insecure: false

seaweedfs:
  s3:
    enabled: true
    enabledAuth: true
    credentials:
      admin:
        accessKey: admin
        secretKey: admin123
    createBuckets:
      - name: ppa
  filer:
    enabled: false
  master:
    enabled: false
  volume:
    enabled: false
