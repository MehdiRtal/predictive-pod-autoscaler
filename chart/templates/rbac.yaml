apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ppa.fullname" . }}-scaler
  labels:
    {{- include "ppa.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ppa.fullname" . }}-scaler
  labels:
    {{- include "ppa.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - "ppa.io"
    resources:
      - models
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ppa.fullname" . }}-scaler
  labels:
    {{- include "ppa.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ppa.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "ppa.fullname" . }}-scaler
    namespace: {{ .Release.Namespace }}
